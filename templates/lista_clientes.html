<table class="table">
  <thead>
    <tr>
      <th scope="col">#</th>
      <th scope="col">Nome</th>
      <th scope="col">Email</th>
      <th scope="col">Ações</th>
    </tr>
  </thead>

  <tbody>
    {% for cliente in clientes %}
    <tr>
      <th scope="row">{{ cliente['id'] }}</th>
      <td>{{ cliente['nome'] }}</td>
      <td>{{ cliente['email'] }}</td>
      <td>
        <button class="btn btn-success">Editar</button>
        <button class="btn btn-danger">Excluir</button>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
